<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP地址检测<../../../title/index.html>
<script defer src="../../../assets/shuoweb.com/489e05ccf8cd_common.js"></script>
    <link rel="stylesheet" href="../../../assets/shuoweb.com/1fdedf911582_href.css">
</head>
<body>
    <div class="container">
        <h1>您的IP地址信息<../../../h1/index.html>
        <div class="card"><../../../div/index.html>
    <../../../div/index.html>

<script>
async function getIP(){
let e=document.querySelector(".card");
try{
let t=await fetch("https://ipapi.co/json/",{headers:{"Accept-Language":"zh-CN"}}),
a=await t.json();
e.innerHTML=`<div><strong>IP地址：<../../../strong/index.html>${a.ip}<../../../div/index.html><div><strong>地理位置：<../../../strong/index.html>${a.country_name} · ${a.region} · ${a.city}<../../../div/index.html><div><strong>运营商：<../../../strong/index.html>${a.org||"未知"}<../../../div/index.html><div><strong>时区：<../../../strong/index.html>${a.timezone}<../../../div/index.html><div><strong>经纬度：<../../../strong/index.html>${a.latitude}, ${a.longitude}<../../../div/index.html><div><strong>货币：<../../../strong/index.html>${a.currency} (${a.currency_name})<../../../div/index.html>`
}catch(t){e.innerHTML="<p>获取IP信息失败，请刷新重试<../../../p/index.html>"}}
window.onload=getIP;
</script>

</body>
</html>
