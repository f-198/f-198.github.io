<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>Shuo Phone API</title>
<script defer="" src="../../archives/shuoweb.com/20260614_181323/assets/shuoweb.com/489e05ccf8cd_common.js"></script>
<link href="../../archives/shuoweb.com/20260614_181323/assets/shuoweb.com/1fdedf911582_href.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
<div class="card">
<h1>Device Info</h1>
<div class="grid">
<div class="item">
<div class="label">品牌</div>
<div class="value" id="brand">-</div>
</div>
<div class="item">
<div class="label">型号</div>
<div class="value" id="model">-</div>
</div>
<div class="item">
<div class="label">系统</div>
<div class="value" id="os">-</div>
</div>
<div class="item">
<div class="label">CPU</div>
<div class="value" id="cpu">-</div>
</div>
<div class="item">
<div class="label">GPU</div>
<div class="value" id="gpu">-</div>
</div>
<div class="item">
<div class="label">RAM</div>
<div class="value" id="ram">-</div>
</div>
<div class="item">
<div class="label">分辨率</div>
<div class="value" id="resolution">-</div>
</div>
<div class="item">
<div class="label">DPI</div>
<div class="value" id="dpi">-</div>
</div>
</div>
<button onclick="loadPhone()">随机设备</button>
<div class="status" id="status">等待加载...</div>
</div>
</div>
<script>
const API = "https://api.shuoweb.com/phone/";
const TIMEOUT = 30000;

async function loadPhone() {
    const status = document.getElementById("status");
    status.innerText = "正在等待服务器响应...";

    try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), TIMEOUT);
        const start = performance.now();

        const res = await fetch(API, {
            signal: controller.signal,
            cache: "no-store"
        });

        clearTimeout(timer);

        if (!res.ok) throw new Error("HTTP " + res.status);

        const d = await res.json();

        document.getElementById("brand").innerText = d.brand || "-";
        document.getElementById("model").innerText = d.model || "-";
        document.getElementById("os").innerText = d.os
            ? d.os + (d.os_versions?.length ? " " + d.os_versions[0] : "")
            : "-";
        document.getElementById("cpu").innerText = d.cpu || "-";
        document.getElementById("gpu").innerText = d.gpu_vendor && d.gpu_renderer
            ? d.gpu_vendor + " " + d.gpu_renderer
            : d.gpu_vendor || d.gpu_renderer || "-";
        document.getElementById("ram").innerText = d.ram || "-";
        document.getElementById("resolution").innerText = d.resolution || "-";
        document.getElementById("dpi").innerText = d.dpi || "-";

        const time = Math.round(performance.now() - start);
        status.innerText = `成功 | ${time} ms`;

    } catch (err) {
        if (err.name === "AbortError") {
            status.innerText = "请求超时（服务器响应较慢）";
        } else {
            status.innerText = "网络错误：" + err.message;
        }
    }
}

loadPhone();
</script>
