<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>萧县中学表白墙</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
        /* 动态主题系统 - 基于背景光晕漫反射 */
        :root {
            --blob1: #bfdbfe; /* blue-200 */
            --blob2: #fbcfe8; /* pink-200 */
            --blob3: #ddd6fe; /* violet-200 */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
        }

        [data-theme="white"] {
            --blob1: #f1f5f9; --blob2: #e2e8f0; --blob3: #f8fafc;
            --accent: #0f172a;
        }

        [data-theme="pink"] {
            --blob1: #fbcfe8; --blob2: #fecdd3; --blob3: #fce7f3;
            --accent: #db2777;
        }

        [data-theme="dark"] {
            --blob1: #1e3a8a; --blob2: #4c1d95; --blob3: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #60a5fa;
            background-color: #020617; /* 真黑底色防止漏光 */
        }

        * {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Sans SC', sans-serif;
            box-sizing: border-box;
        }

        body {
            color: var(--text-main);
            overflow-x: hidden;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }
        [data-theme="dark"] body { background-color: #020617; }

        /* 极致的毛玻璃卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* 文字颜色工具类 */
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 流畅的动画体系 */
        .tap-effect { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .tap-effect:active { transform: scale(0.92); }
        
        /* 弹簧点赞特效 */
        @keyframes springPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.4) rotate(-10deg); }
            70% { transform: scale(0.9) rotate(5deg); }
            100% { transform: scale(1); }
        }
        .anim-spring { animation: springPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* 瀑布流进场动画 */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .stagger-item {
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 动态背景气泡动画 */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* 输入框去发光 */
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: none;
        }

        /* 遮罩 */
        .overlay-glass {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        /* Toast */
        #toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 500; animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1), fadeOut 0.3s 2.5s forwards; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* 内容文本优化 */
        .content-text { line-height: 1.7; letter-spacing: 0.02em; }

        /* 筛选开关统一样式 */
        .filter-toggle {
            transition: transform .2s cubic-bezier(0.34, 1.56, 0.64, 1), background-color .2s ease, color .2s ease, box-shadow .2s ease, border-color .2s ease;
            width: 100%;
        }
        .filter-toggle .filter-state-box {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: .45rem;
            border: 2px solid rgba(59, 130, 246, .35);
            background: rgba(59, 130, 246, .08);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.38);
            flex: 0 0 auto;
            margin-left: auto;
            transition: background-color .2s ease, border-color .2s ease, box-shadow .2s ease, transform .2s ease;
        }
        .filter-toggle.is-active {
            background-color: rgba(59, 130, 246, .10);
            color: var(--accent);
            border-color: rgba(59, 130, 246, .25);
            box-shadow: 0 10px 22px rgba(59, 130, 246, .10);
        }
        .filter-toggle.is-active .filter-state-box {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, .14);
            transform: scale(1.02);
        }
        .filter-toggle[aria-pressed="true"] .filter-state-box {
            transform: scale(1.02);
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .app-bar {
                min-height: 4rem;
                height: auto;
                padding-top: .7rem;
                padding-bottom: .7rem;
                gap: .5rem;
            }
            .app-bar h1 {
                font-size: 1.02rem;
                line-height: 1.2;
                letter-spacing: 0.12em;
                text-align: center;
            }
            .top-controls {
                flex-direction: column;
                align-items: stretch;
                gap: .75rem;
            }
            .top-controls > * {
                width: 100%;
            }
            .sort-chip-group {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                justify-content: flex-start;
                flex-wrap: nowrap;
            }
            .sort-chip-group button {
                flex: 0 0 auto;
            }
            .sort-chip-group select {
                min-width: 8.5rem;
            }
            .announcement-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-toggle {
                gap: .55rem;
                padding-left: .9rem;
                padding-right: .9rem;
            }
            .filter-label {
                font-size: .92rem;
                line-height: 1.15;
            }
            .announcement-icon {
                width: 2.75rem;
                height: 2.75rem;
            }
            .admin-modal {
                align-items: flex-start;
                padding-top: .75rem;
                padding-bottom: .75rem;
                overflow-y: auto;
            }
            .admin-panel {
                max-height: calc(100dvh - 1.5rem);
                overflow-y: auto;
                overscroll-behavior: contain;
                -webkit-overflow-scrolling: touch;
            }
            .detail-panel {
                max-height: calc(100vh - 1rem);
                overflow-y: auto;
            }
        }

        /* 语音播放器与录音控件 */
        .voice-range {
            width: 100%;
            min-width: 0;
            height: 2.15rem;
            background: transparent;
            accent-color: var(--accent);
            cursor: pointer;
            touch-action: manipulation;
        }
        .voice-range::-webkit-slider-runnable-track {
            height: .6rem;
            border-radius: 999px;
            background: rgba(148, 163, 184, .22);
        }
        .voice-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 1.15rem;
            height: 1.15rem;
            margin-top: -.28rem;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,.18);
        }
        .voice-range::-moz-range-track {
            height: .6rem;
            border-radius: 999px;
            background: rgba(148, 163, 184, .22);
        }
        .voice-range::-moz-range-thumb {
            width: 1.15rem;
            height: 1.15rem;
            border: none;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,.18);
        }
        @media (max-width: 640px) {
            .voice-range {
                height: 2.9rem;
            }
            .voice-range::-webkit-slider-runnable-track,
            .voice-range::-moz-range-track {
                height: .84rem;
            }
        }
        .voice-audio {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            left: -9999px;
        }

    </style>
</head>
<body class="antialiased pb-28 max-w-2xl mx-auto min-h-screen relative">
<!-- 流体动态背景层 -->
<div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none transition-colors duration-500">
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob" style="background-color: var(--blob1);"></div>
<div class="absolute top-[20%] right-[-10%] w-96 h-96 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob animation-delay-2000" style="background-color: var(--blob2);"></div>
<div class="absolute bottom-[-20%] left-[20%] w-96 h-96 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob animation-delay-4000" style="background-color: var(--blob3);"></div>
</div>
<!-- 顶部导航栏 App Bar (毛玻璃) -->
<header class="app-bar fixed top-0 left-0 right-0 z-40 glass-card h-16 sm:h-16 max-w-2xl mx-auto flex items-center justify-between px-4 sm:px-5 border-t-0 border-l-0 border-r-0 rounded-b-3xl gap-2 sm:gap-0 flex-wrap sm:flex-nowrap">
<button class="p-2 -ml-2 rounded-full tap-effect hover:bg-black/5 dark:hover:bg-white/10" onclick="toggleDrawer(true)" style="color: var(--text-muted)" type="button">
<svg fill="none" height="26" stroke="currentColor" stroke-linecap="round" stroke-width="2.5" viewbox="0 0 24 24" width="26">
<line x1="4" x2="20" y1="6" y2="6"></line>
<line x1="4" x2="20" y1="12" y2="12"></line>
<line x1="4" x2="16" y1="18" y2="18"></line>
</svg>
</button>
<h1 class="text-2xl sm:text-3xl md:text-4xl font-black tracking-widest text-accent">萧县中学表白墙</h1>
<button class="p-2 -mr-2 rounded-full tap-effect hover:bg-black/5 dark:hover:bg-white/10 shrink-0" onclick="toggleSearch()" style="color: var(--text-muted)" type="button">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-width="2.5" viewbox="0 0 24 24" width="24"><circle cx="11" cy="11" r="8"></circle><line x1="21" x2="16.65" y1="21" y2="16.65"></line></svg>
</button>
</header>
<!-- 搜索栏 -->
<div class="fixed top-16 left-0 right-0 z-30 max-w-2xl mx-auto p-4 hidden" id="searchBar">
<div class="glass-card rounded-full flex items-center px-4 py-1 shadow-lg">
<svg fill="none" height="20" stroke="currentColor" stroke-width="2" style="color: var(--text-muted)" viewbox="0 0 24 24" width="20"><circle cx="11" cy="11" r="8"></circle><line x1="21" x2="16.65" y1="21" y2="16.65"></line></svg>
<input class="flex-1 bg-transparent border-none px-3 py-2 text-[15px] font-medium" id="searchInput" maxlength="40" oninput="filterPosts()" placeholder="搜索名字、内容或评论..." style="color: var(--text-main)" type="text"/>
<button class="p-2 rounded-full tap-effect" onclick="toggleSearch()" style="color: var(--text-muted)" type="button"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-width="2.5" viewbox="0 0 24 24" width="20"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg></button>
</div>
</div>
<!-- 站点公告 -->
<div class="mt-20 px-4 sm:px-5 hidden" id="announcementBar">
<div class="announcement-card glass-card rounded-[1.75rem] px-4 py-3 flex items-start gap-3">
<div class="announcement-icon w-9 h-9 rounded-2xl bg-accent text-white flex items-center justify-center flex-shrink-0 shadow-md">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4" viewbox="0 0 24 24" width="18">
<path d="M3 11v2a1 1 0 0 0 1 1h2l5 5V5L6 10H4a1 1 0 0 0-1 1z"></path>
<path d="M14 9a3 3 0 0 1 0 6"></path>
<path d="M17 6a7 7 0 0 1 0 12"></path>
</svg>
</div>
<div class="min-w-0 flex-1">
<div class="text-sm sm:text-xs font-black uppercase tracking-widest opacity-50 mb-1" style="color: var(--text-main)">公告</div>
<div class="text-base sm:text-[17px] font-bold leading-7 sm:leading-8 break-words" id="announcementText" style="color: var(--text-main)"></div>
</div>
</div>
</div>
<!-- 筛选区 -->
<div class="mt-20 px-5 py-3 flex flex-col gap-3 text-sm font-medium top-controls" style="color: var(--text-muted)">
<span class="bg-black/5 dark:bg-white/10 px-3 py-1 rounded-full text-xs font-bold self-start" id="postCountInfo">读取中...</span>
<div class="flex flex-wrap gap-2 items-center">
<div class="flex gap-2 glass-card p-1 rounded-full shadow-sm sort-chip-group">
<button class="px-4 py-1.5 rounded-full tap-effect transition-all text-white bg-accent shadow-md" id="btnSortNew" onclick="setSort('new')" type="button">最新</button>
<button class="px-4 py-1.5 rounded-full tap-effect transition-all" id="btnSortHot" onclick="setSort('hot')" style="color: var(--text-muted)" type="button">热门</button>
</div>
<select class="glass-card h-11 rounded-full px-4 text-xs font-black bg-transparent w-full sm:w-auto sm:min-w-36" id="sortSelect" onchange="setSort(this.value)" style="color: var(--text-main)">
<option value="new">最新</option>
<option value="active">活跃</option>
<option value="hot">热门</option>
<option value="likes">最多点赞</option>
<option value="comments">最多评论</option>
<option value="old">最早</option>
</select>
</div>
</div>
<!-- 帖子主容器 -->
<main class="px-4 mt-2 space-y-5" id="postContainer">
<!-- 骨架屏采用玻璃材质 -->
<div class="glass-card rounded-[2rem] p-6 animate-pulse">
<div class="h-5 bg-black/10 dark:bg-white/10 rounded-full w-1/3 mb-5"></div>
<div class="h-24 bg-black/5 dark:bg-white/5 rounded-2xl w-full mb-5"></div>
<div class="h-4 bg-black/10 dark:bg-white/10 rounded-full w-1/4"></div>
</div>
</main>
<div class="px-4 mt-5 pb-36" id="pagination"></div>
<!-- 浮动发帖按钮 (Material You 超大圆角) -->
<button class="fixed bottom-8 right-6 z-30 w-16 h-16 bg-accent text-white rounded-[1.5rem] shadow-[0_10px_25px_rgba(59,130,246,0.5)] flex items-center justify-center tap-effect transition-all hover:scale-105 ml-auto max-w-2xl right-auto" onclick="openPostModal()" style="right: max(24px, calc(50vw - 21rem));" type="button">
<svg fill="none" height="30" stroke="currentColor" stroke-linecap="round" stroke-width="2.5" viewbox="0 0 24 24" width="30"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
</button>
<!-- 侧边栏 Drawer -->
<div class="fixed inset-0 z-50 overlay-glass hidden opacity-0" id="drawerOverlay" onclick="toggleDrawer(false)"></div>
<div class="fixed top-0 left-0 bottom-0 z-50 w-[75vw] max-w-sm glass-card border-l-0 border-t-0 border-b-0 rounded-r-[2rem] shadow-2xl transform -translate-x-full transition-transform duration-400 ease-[cubic-bezier(0.2,0.8,0.2,1)] flex flex-col overflow-hidden" id="drawer">
<div class="p-8 pb-6 relative overflow-hidden">
<div class="absolute inset-0 bg-accent opacity-10"></div>
<div class="w-20 h-20 bg-accent text-white rounded-[1.5rem] flex items-center justify-center text-3xl font-black mb-4 shadow-lg transform rotate-3">XX</div>
<h2 class="text-3xl sm:text-4xl font-black text-accent tracking-wide">萧县中学表白墙</h2>
<p class="text-xs font-medium mt-2 opacity-60" id="deviceIdDisplay" style="color: var(--text-main)">ID: 加载中...</p>
</div>
<div class="flex-1 overflow-y-auto py-4 px-4 space-y-2">
<button aria-pressed="false" class="w-full flex items-center px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold" id="btnMineOnly" onclick="filterMyPosts()" style="color: var(--text-main)" type="button">
<svg class="mr-4 shrink-0" fill="none" height="22" stroke="currentColor" stroke-width="2.5" style="color: var(--text-muted)" viewbox="0 0 24 24" width="22"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
<span class="filter-label">只看我的</span>
</button>
<div class="px-4 py-3 mt-4 text-xs font-black tracking-widest uppercase opacity-40" style="color: var(--text-main)">主题风格</div>
<div class="flex gap-3 px-4">
<div class="w-10 h-10 rounded-full bg-blue-100 border-2 border-blue-400 tap-effect cursor-pointer shadow-inner" onclick="setTheme('light-blue')"></div>
<div class="w-10 h-10 rounded-full bg-slate-100 border-2 border-slate-300 tap-effect cursor-pointer shadow-inner" onclick="setTheme('white')"></div>
<div class="w-10 h-10 rounded-full bg-pink-100 border-2 border-pink-400 tap-effect cursor-pointer shadow-inner" onclick="setTheme('pink')"></div>
<div class="w-10 h-10 rounded-full bg-slate-800 border-2 border-slate-600 tap-effect cursor-pointer shadow-inner" onclick="setTheme('dark')"></div>
</div>
<div class="px-4 py-3 mt-4 text-xs font-black tracking-widest uppercase opacity-40" style="color: var(--text-main)">高级</div>
<button aria-pressed="false" class="filter-toggle w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold text-left min-h-14" id="btnFavOnly" onclick="toggleFavoriteFilter()" style="color: var(--text-main)" type="button">
<span aria-hidden="true" class="filter-state-box"></span>
<span class="filter-label flex-1 min-w-0 text-sm sm:text-[15px] leading-tight">只看收藏</span><span class="ml-2 text-xs font-black opacity-60 shrink-0" id="favCountBadge">0</span>
</button>
<button aria-pressed="false" class="filter-toggle w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold text-left min-h-14" id="btnLikedOnly" onclick="toggleLikedFilter()" style="color: var(--text-main)" type="button">
<span aria-hidden="true" class="filter-state-box"></span>
<span class="filter-label flex-1 min-w-0 text-sm sm:text-[15px] leading-tight">只看点赞</span><span class="ml-2 text-xs font-black opacity-60 shrink-0" id="likedCountBadge">0</span>
</button>
<button aria-pressed="false" class="filter-toggle w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold text-left min-h-14" id="btnUnreadOnly" onclick="toggleUnreadFilter()" style="color: var(--text-main)" type="button">
<span aria-hidden="true" class="filter-state-box"></span>
<span class="filter-label flex-1 min-w-0 text-sm sm:text-[15px] leading-tight">只看未读</span><span class="ml-2 text-xs font-black opacity-60 shrink-0" id="unreadCountBadge">0</span>
</button>
<button aria-pressed="false" class="filter-toggle w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold text-left min-h-14" id="btnPinnedOnly" onclick="togglePinnedFilter()" style="color: var(--text-main)" type="button">
<span aria-hidden="true" class="filter-state-box"></span>
<span class="filter-label flex-1 min-w-0 text-sm sm:text-[15px] leading-tight">只看置顶</span><span class="ml-2 text-xs font-black opacity-60 shrink-0" id="pinnedCountBadge">0</span>
</button>
<button aria-pressed="false" class="filter-toggle w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold text-left min-h-14" id="btnAnonOnly" onclick="toggleAnonFilter()" style="color: var(--text-main)" type="button">
<span aria-hidden="true" class="filter-state-box"></span>
<span class="filter-label flex-1 min-w-0 text-sm sm:text-[15px] leading-tight">只看匿名</span>
</button>
<button aria-pressed="false" class="filter-toggle w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl tap-effect hover:bg-black/5 dark:hover:bg-white/10 transition-colors font-bold text-left min-h-14" id="btnPublicOnly" onclick="togglePublicFilter()" style="color: var(--text-main)" type="button">
<span aria-hidden="true" class="filter-state-box"></span>
<span class="filter-label flex-1 min-w-0 text-sm sm:text-[15px] leading-tight">只看公开</span>

<!-- Toast 容器 -->
<div id="toast-container"></div>
<script>
        // --- 核心状态与初始化 ---
        let posts = [];
        let currentSort = 'new';
        let filterKeyword = '';
        let currentPage = 1;
        const pageSize = 6;
        const nameMaxLen = 16;
        const contentMaxLen = 500;
        const commentMaxLen = 200;
        const voiceMaxSeconds = 30;
        const searchMaxLen = 40;
        const adminPwdMaxLen = 32;
        let deviceId = localStorage.getItem('xxzx_device_id');
        let adminToken = sessionStorage.getItem('xxzx_admin_token');
        let siteSettings = { announcement: '' };
        let pendingDeepLinkPostId = (() => {
            try {
                const queryId = new URLSearchParams(window.location.search).get('post') || '';
                if (queryId) return queryId;
                const hashMatch = (window.location.hash || '').match(/^#post_(.+)$/);
                return hashMatch ? decodeURIComponent(hashMatch[1]) : '';
            } catch (e) {
                return '';
            }
        })();

        if (!deviceId) {
            deviceId = 'u_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
            localStorage.setItem('xxzx_device_id', deviceId);
        }

        document.getElementById('deviceIdDisplay').textContent = 'ID: ' + deviceId.substr(0, 8) + '...';

        // --- 主题系统 ---
        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('xxzx_theme', themeName);
            // 改变状态栏颜色(移动端)
            const metaThemeColor = document.querySelector("meta[name=theme-color]");
            if(metaThemeColor) metaThemeColor.remove();
            const colors = {'light-blue': '#f8fafc', 'white': '#f8fafc', 'pink': '#fdf2f8', 'dark': '#020617'};
            document.head.insertAdjacentHTML('beforeend', `<meta name="theme-color" content="${colors[themeName] || '#f8fafc'}">`);
        }
        const savedTheme = localStorage.getItem('xxzx_theme');
        if (savedTheme) setTheme(savedTheme);

        // --- API 封装 ---
        async function apiCall(action, payload = {}) {
            payload.deviceId = deviceId;
            if (adminToken) payload.adminPwd = adminToken;

            try {
                const res = await fetch(`?api=${action}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const raw = await res.text();
                let data = null;
                try {
                    data = JSON.parse(raw);
                } catch (e) {
                    const matched = raw.match(/\{[\s\S]*\}$/);
                    if (matched) {
                        try { data = JSON.parse(matched[0]); } catch (e2) {}
                    }
                }
                if (!data || typeof data !== 'object') {
                    throw new Error('invalid json');
                }
                if (!data.success && data.msg) showToast(data.msg);
                return data;
            } catch (e) {
                showToast('网络开小差了，请重试');
                return { success: false, msg: '加载失败' };
            }
        }

        // --- 数据加载与渲染 ---

        const LS_FAV_KEY = 'xxzx_favorites_v1';
        const LS_RECENT_KEY = 'xxzx_recent_posts_v1';
        const LS_VIEWED_KEY = 'xxzx_viewed_posts_v1';
        const LS_DRAFT_KEY = 'xxzx_post_draft_v1';
        const LS_FILTER_KEY = 'xxzx_filter_fav_only_v1';
        const LS_LIKED_KEY = 'xxzx_filter_liked_only_v1';
        const LS_UNREAD_KEY = 'xxzx_filter_unread_only_v1';
        const LS_PINNED_KEY = 'xxzx_filter_pinned_only_v1';
        const LS_ANON_KEY = 'xxzx_filter_anon_only_v1';
        const LS_PUBLIC_KEY = 'xxzx_filter_public_only_v1';
        const LS_MINE_KEY = 'xxzx_filter_mine_only_v1';
        let showOnlyMine = localStorage.getItem(LS_MINE_KEY) === '1';
        let showOnlyLiked = localStorage.getItem(LS_LIKED_KEY) === '1';
        let showOnlyUnread = localStorage.getItem(LS_UNREAD_KEY) === '1';
        let showOnlyPinned = localStorage.getItem(LS_PINNED_KEY) === '1';
        let showOnlyAnon = localStorage.getItem(LS_ANON_KEY) === '1';
        let showOnlyPublic = localStorage.getItem(LS_PUBLIC_KEY) === '1';
        let detailCommentKeyword = '';
        let detailCommentsCollapsed = false;
        let detailReplyTarget = null;
        const voiceDrafts = {};
        let activeVoiceRecorder = null;
        let activeVoiceStream = null;
        let activeVoicePostId = '';
        let activeVoiceChunks = [];
        let activeVoiceStartedAt = 0;
        let activeVoiceMime = 'audio/wav';
        let activeVoiceDiscard = false;
        let activeVoiceContext = null;
        let activeVoiceSource = null;
        let activeVoiceProcessor = null;
        let activeVoiceBuffers = [];
        const voicePlayableCache = new Map();
        const voiceSeeking = new Set();


        function safeJsonParse(value, fallback) {
            try {
                const parsed = JSON.parse(value);
                return parsed === null || parsed === undefined ? fallback : parsed;
            } catch (e) {
                return fallback;
            }
        }

        function getStorageArray(key) {
            const raw = localStorage.getItem(key);
            const parsed = safeJsonParse(raw, []);
            return Array.isArray(parsed) ? parsed : [];
        }

        function setStorageArray(key, arr) {
            localStorage.setItem(key, JSON.stringify(Array.isArray(arr) ? arr : []));
        }

        function getFavoriteIds() {
            return getStorageArray(LS_FAV_KEY);
        }

        function isFavoritePost(postId) {
            return getFavoriteIds().includes(postId);
        }

        function toggleFavoritePost(postId) {
            const ids = getFavoriteIds();
            const idx = ids.indexOf(postId);
            if (idx >= 0) {
                ids.splice(idx, 1);
                showToast('已取消收藏');
            } else {
                ids.unshift(postId);
                showToast('已收藏');
            }
            setStorageArray(LS_FAV_KEY, ids.slice(0, 100));
            renderPosts();
            renderDetailIfOpen();
            renderUtilityPanels();
        }

        function getRecentIds() {
            return getStorageArray(LS_RECENT_KEY);
        }

        function markRecentPost(postId) {
            if (!postId) return;
            const ids = getRecentIds().filter(id => id !== postId);
            ids.unshift(postId);
            setStorageArray(LS_RECENT_KEY, ids.slice(0, 20));
            renderUtilityPanels();
        }

        function getViewedIds() {
            return getStorageArray(LS_VIEWED_KEY);
        }

        function isViewedPost(postId) {
            return getViewedIds().includes(postId);
        }

        function markViewedPost(postId) {
            if (!postId) return;
            const ids = getViewedIds().filter(id => id !== postId);
            ids.unshift(postId);
            setStorageArray(LS_VIEWED_KEY, ids.slice(0, 200));
            renderUtilityPanels();
        }

        function getDraftData() {
            return safeJsonParse(localStorage.getItem(LS_DRAFT_KEY), null);
        }

        function updateDraftHint() {
            const el = document.getElementById('draftHint');
            if (!el) return;
            const draft = getDraftData();
            el.textContent = draft && (draft.to || draft.from || draft.content) ? '草稿已保存' : '暂无草稿';
        }

        function saveDraftData() {
            const draft = {
                to: document.getElementById('postTo')?.value || '',
                from: document.getElementById('postFrom')?.value || '',
                content: document.getElementById('postContent')?.value || '',
                anon: !!document.getElementById('postAnon')?.checked
            };
            localStorage.setItem(LS_DRAFT_KEY, JSON.stringify(draft));
            updateDraftHint();
        }

        function restoreDraftData() {
            const draft = getDraftData();
            if (!draft) return false;
            const postTo = document.getElementById('postTo');
            const postFrom = document.getElementById('postFrom');
            const postContent = document.getElementById('postContent');
            const postAnon = document.getElementById('postAnon');
            if (postTo) postTo.value = draft.to || '';
            if (postFrom) postFrom.value = draft.from || '';
            if (postContent) postContent.value = draft.content || '';
            if (postAnon) postAnon.checked = !!draft.anon;
            if (postContent) {
                const count = postContent.value.length;
                document.getElementById('wordCount').textContent = count;
                document.getElementById('wordCount').className = count > 450 ? 'font-black text-red-500' : (count > 400 ? 'font-black text-yellow-500' : 'font-black');
            }
            updateDraftHint();
            return true;
        }

        function clearDraftData() {
            localStorage.removeItem(LS_DRAFT_KEY);
            updateDraftHint();
        }

        function clampInputValue(el, maxLen) {
            if (!el) return;
            if (typeof el.value === 'string' && el.value.length > maxLen) {
                el.value = el.value.slice(0, maxLen);
            }
        }

        function bindMaxLengthGuards() {

function formatVoiceDuration(seconds) {
    const total = Math.max(0, Math.floor(Number(seconds) || 0));
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
}

function getVoicePlayableSrc(src) {
    const raw = String(src || '').trim();
    if (!raw) return '';
    if (/^blob:/i.test(raw)) return raw;
    if (!/^data:/i.test(raw)) return raw;
    if (voicePlayableCache.has(raw)) return voicePlayableCache.get(raw);
    try {
        const commaIndex = raw.indexOf(',');
        if (commaIndex < 0) return raw;
        const meta = raw.slice(5, commaIndex);
        const base64 = raw.slice(commaIndex + 1).replace(/\s+/g, '');
        const mime = (meta.split(';')[0] || 'audio/wav').trim() || 'audio/wav';
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mime });
        const objectUrl = URL.createObjectURL(blob);
        voicePlayableCache.set(raw, objectUrl);
        return objectUrl;
    } catch (e) {
        return raw;
    }
}

function cleanupVoicePlayableCache() {
    voicePlayableCache.forEach(url => {
        try { URL.revokeObjectURL(url); } catch (e) {}
    });
    voicePlayableCache.clear();
}

window.addEventListener('beforeunload', cleanupVoicePlayableCache);

function encodeWavBlob(buffers, sampleRate) {
    const channels = 1;
    const samples = buffers.reduce((sum, arr) => sum + arr.length, 0);
    const interleaved = new Float32Array(samples);
    let offset = 0;
    buffers.forEach(arr => {
        interleaved.set(arr, offset);
        offset += arr.length;
    });

    const buffer = new ArrayBuffer(44 + interleaved.length * 2);
    const view = new DataView(buffer);

    const writeString = (offset, str) => {
        for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    };

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + interleaved.length * 2, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, channels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * channels * 2, true);
    view.setUint16(32, channels * 2, true);
    view.setUint16(34, 16, true);
    writeString(36, 'data');
    view.setUint32(40, interleaved.length * 2, true);

    let index = 44;
    for (let i = 0; i < interleaved.length; i++, index += 2) {
        let s = Math.max(-1, Math.min(1, interleaved[i]));
        view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return new Blob([view], { type: 'audio/wav' });
}


async function blobToDataURL(blob) {
    return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('语音转换失败'));
        reader.readAsDataURL(blob);
    });
}

function syncVoicePlayer(postId, scope) {
    const audio = document.getElementById(`voiceAudio_${scope}_${postId}`);
    const range = document.getElementById(`voiceRange_${scope}_${postId}`);
    const time = document.getElementById(`voiceTime_${scope}_${postId}`);
    if (!audio || !range || !time) return;
    if (audio.classList && audio.classList.contains('voice-audio') && audio.style.display === 'none') {
        audio.style.display = '';
    }
    const key = `${scope}_${postId}`;
    const duration = Number.isFinite(audio.duration) && audio.duration > 0 ? audio.duration : (voiceDrafts[postId]?.duration || 0);
    const current = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
    if (!voiceSeeking.has(key)) {
        range.max = String(Math.max(duration || 0, 1));
        range.value = String(current);
    } else {
        range.max = String(Math.max(duration || 0, 1));
    }
    const curLabel = formatVoiceDuration(current);
    const durLabel = formatVoiceDuration(duration);
    time.textContent = `${curLabel} / ${durLabel}`;
    const icon = document.querySelector(`[data-voice-play-icon="${scope}_${postId}"]`);
    if (icon) {
        const playing = !audio.paused && !audio.ended;
        icon.innerHTML = playing
            ? '<rect x="7" y="6" width="4" height="12" rx="1.5"></rect><rect x="13" y="6" width="4" height="12" rx="1.5"></rect>'
            : '<polygon points="8 5 19 12 8 19 8 5"></polygon>';
    }
}

function beginVoiceDrag(postId, scope) {

        try { audio.pause(); } catch (e) {}
    }
    syncVoicePlayer(postId, scope);
}

function endVoiceDrag(postId, scope) {
    const key = `${scope}_${postId}`;
    setTimeout(() => {

}

function toggleVoicePlayback(postId, scope) {
    const audio = document.getElementById(`voiceAudio_${scope}_${postId}`);
    if (!audio) return;
    if (audio.paused) {
        document.querySelectorAll('audio[id^="voiceAudio_"]').forEach(el => {
            if (el !== audio) {
                try { el.pause(); } catch (e) {}
            }
        });
        try {
            if (audio.ended || (Number.isFinite(audio.duration) && audio.currentTime >= Math.max(0, audio.duration - 0.05))) {
                audio.currentTime = 0;
            }
        } catch (e) {}
        const p = audio.play();
        if (p && typeof p.then === 'function') {
            p.then(() => syncVoicePlayer(postId, scope)).catch(() => showToast('无法播放语音'));
        } else {
            syncVoicePlayer(postId, scope);
        }
    } else {
        audio.pause();
        syncVoicePlayer(postId, scope);
    }
}

function seekVoice(postId, scope, value) {
    const audio = document.getElementById(`voiceAudio_${scope}_${postId}`);
    if (!audio) return;
    const next = Math.max(0, Number(value) || 0);
    const key = `${scope}_${postId}`;
    voiceSeeking.add(key);
    try {
        audio.currentTime = next;
    } catch (e) {}
    syncVoicePlayer(postId, scope);
}

function stopVoicePlayback(postId, scope) {
    const audio = document.getElementById(`voiceAudio_${scope}_${postId}`);
    if (audio) {
        try { audio.pause(); } catch (e) {}
        try { audio.currentTime = 0; } catch (e) {}
    }
    syncVoicePlayer(postId, scope);
}

function cancelVoiceComment(postId, silent = false) {
    document.querySelectorAll(`[data-voice-draft-box="${postId}"] audio`).forEach(audio => {
        try { audio.pause(); } catch (e) {}
    });
    const draft = voiceDrafts[postId];
    if (draft?.url) {
        try { URL.revokeObjectURL(draft.url); } catch (e) {}
    }
    delete voiceDrafts[postId];
    refreshVoiceDraftUI(postId);
    refreshVoiceRecordState(postId);
    if (!silent) showToast('已取消语音');
}

async function sendVoiceComment(postId, scope) {
    const draft = voiceDrafts[postId];
    if (!draft || !draft.blob) {
        showToast('请先录音');
        return;
    }
    const inputId = getCommentInputId(postId, scope);
    const ipt = document.getElementById(inputId);
    const content = ipt ? (ipt.value || '').trim().slice(0, commentMaxLen) : '';
    if (ipt) ipt.value = content;
    const btn = document.querySelector(`[onclick="sendVoiceComment('${postId}', '${scope}')"]`);
    if (btn) btn.disabled = true;
    try {
        const audioData = await blobToDataURL(draft.blob);
        const replyMeta = detailReplyTarget && detailReplyTarget.postId === postId ? {
            replyTo: detailReplyTarget.commentId || '',
            replyName: detailReplyTarget.replyName || ''
        } : {};
        const res = await apiCall('add_voice_comment', {
            postId,
            content,
            audioData,
            audioMime: draft.mime || 'audio/wav',
            audioDuration: draft.duration || 0,
            ...replyMeta
        });
        if (res.success) {
            if (ipt) ipt.value = '';
            cancelVoiceComment(postId, true);
            await loadPosts();
            if (document.getElementById('detailModal') && !document.getElementById('detailModal').classList.contains('hidden')) {
                openPostDetail(postId);
            } else {
                syncCommentArea(postId);
            }
            showToast('语音评论已发布');
        } else {
            showToast(res.msg || '发送失败');
        }
    } catch (e) {
        showToast('语音发送失败');
    } finally {
        if (btn) btn.disabled = false;
    }
}



async function startVoiceRecording(postId) {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('当前浏览器不支持录音');
        return;
    }
    if (activeVoiceRecorder && activeVoicePostId !== postId) {
        await stopVoiceRecording(false);
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) {
            stream.getTracks().forEach(track => track.stop());
            showToast('当前浏览器不支持语音处理');
            return;
        }
        const context = new AudioCtx();
        if (context.state === 'suspended') {
            try { await context.resume(); } catch (e) {}
        }
        const source = context.createMediaStreamSource(stream);
        const processor = context.createScriptProcessor(4096, 1, 1);
        const silentGain = context.createGain();
        silentGain.gain.value = 0;
        const buffers = [];
        const startedAt = Date.now();

        processor.onaudioprocess = (event) => {
            if (!activeVoiceRecorder || activeVoicePostId !== postId || activeVoiceDiscard) return;
            const input = event.inputBuffer.getChannelData(0);
            buffers.push(new Float32Array(input));
        };

        source.connect(processor);
        processor.connect(silentGain);
        silentGain.connect(context.destination);

        activeVoiceRecorder = { kind: 'wav' };
        activeVoiceStream = stream;
        activeVoiceContext = context;
        activeVoiceSource = source;
        activeVoiceProcessor = processor;
        activeVoicePostId = postId;
        activeVoiceBuffers = buffers;
        activeVoiceStartedAt = startedAt;
        activeVoiceMime = 'audio/wav';
        activeVoiceDiscard = false;
        refreshVoiceRecordState(postId);

        const tick = setInterval(() => {
            if (!activeVoiceRecorder || activeVoicePostId !== postId) {
                clearInterval(tick);
                return;
            }
            const elapsed = (Date.now() - startedAt) / 1000;
            if (elapsed >= voiceMaxSeconds) {
                clearInterval(tick);
                showToast('语音最长只能30秒');
                stopVoiceRecording(true);
                return;
            }
            refreshVoiceRecordState(postId);
        }, 250);

        const cleanup = async () => {
            clearInterval(tick);
            if (activeVoiceProcessor) {
                try { activeVoiceProcessor.disconnect(); } catch (e) {}
            }
            if (activeVoiceSource) {
                try { activeVoiceSource.disconnect(); } catch (e) {}
            }
            if (activeVoiceContext && activeVoiceContext.state !== 'closed') {
                try { await activeVoiceContext.close(); } catch (e) {}
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            activeVoiceRecorder = null;
            activeVoiceStream = null;
            activeVoiceContext = null;
            activeVoiceSource = null;
            activeVoiceProcessor = null;
            activeVoicePostId = '';
            activeVoiceStartedAt = 0;
            activeVoiceBuffers = [];
            activeVoiceDiscard = false;
            refreshVoiceRecordState(postId);
        };

        activeVoiceRecorder.stop = async () => {
            const shouldSave = !activeVoiceDiscard;
            const duration = Math.min(voiceMaxSeconds, Math.max(1, Math.round((Date.now() - startedAt) / 1000)));
            const data = shouldSave ? activeVoiceBuffers.slice() : [];
            const wavBlob = shouldSave && data.length ? encodeWavBlob(data, context.sampleRate || 44100) : null;
            await cleanup();
            if (shouldSave && wavBlob && wavBlob.size >= 44) {
                const current = voiceDrafts[postId];
                if (current?.url) {
                    try { URL.revokeObjectURL(current.url); } catch (e) {}
                }
                voiceDrafts[postId] = {
                    blob: wavBlob,
                    url: URL.createObjectURL(wavBlob),
                    mime: 'audio/wav',
                    duration,
                    caption: ''
                };
                refreshVoiceDraftUI(postId);
                showToast('录音已完成');
            } else if (shouldSave) {
                showToast('录音内容太短');
            }
        };

    } catch (e) {
        showToast('无法启动录音权限');
        activeVoiceRecorder = null;
        activeVoiceStream = null;
        activeVoiceContext = null;
        activeVoiceSource = null;
        activeVoiceProcessor = null;
        activeVoicePostId = '';
        activeVoiceBuffers = [];
        activeVoiceStartedAt = 0;
        activeVoiceDiscard = false;
        refreshVoiceRecordState(postId);
    }
}

async function stopVoiceRecording(commit = true) {
    const recorder = activeVoiceRecorder;
    if (!recorder || typeof recorder.stop !== 'function') return;
    activeVoiceDiscard = !commit;
    try {
        await recorder.stop();
    } catch (e) {
        const stream = activeVoiceStream;
        if (stream) stream.getTracks().forEach(track => track.stop());
        activeVoiceRecorder = null;
        activeVoiceStream = null;
        activeVoiceContext = null;
        activeVoiceSource = null;
        activeVoiceProcessor = null;
        activeVoiceBuffers = [];
        activeVoicePostId = '';
        activeVoiceStartedAt = 0;
        activeVoiceDiscard = false;
        refreshVoiceRecordState('');
        showToast('录音停止失败');
    }
}

async function toggleVoiceRecord(postId) {

    if (activeVoiceRecorder && activeVoicePostId === postId) {
        await stopVoiceRecording(true);
        return;
    }
    if (activeVoiceRecorder && activeVoicePostId !== postId) {
        await stopVoiceRecording(false);
    }
    await startVoiceRecording(postId);
}

        function openPostDetail(postId) {

                return;
            }

            try { markRecentPost(postId); } catch (e) {}
            try { markViewedPost(postId); } catch (e) {}
            try { markViewedPost(postId); } catch (e) {}
            detailReplyTarget = null;
            detailCommentKeyword = '';
            detailCommentsCollapsed = false;

            let detailHtml = '';
            try {
                detailHtml = renderDetailHtml(post);
            } catch (e) {
                detailHtml = `<div class="p-8 text-center font-bold opacity-60">详情加载失败</div>`;

        async function sendDetailComment(postId) {
            const ipt = document.getElementById(`detailIpt_${postId}`);
            if (!ipt) return;
            const content = ipt.value.trim().slice(0, commentMaxLen);
            ipt.value = content;

            const replyMeta = detailReplyTarget && detailReplyTarget.postId === postId ? {
                replyTo: detailReplyTarget.commentId || '',
                replyName: detailReplyTarget.replyName || ''
            } : {};
            const res = await apiCall('add_comment', { postId, content, ...replyMeta });
            if (res.success) {
                ipt.value = '';
                detailReplyTarget = null;
                await loadPosts();
                openPostDetail(postId);
                showToast('评论成功');
            }
        }

        function syncPostLikeUI(post) {
            if (!post) return;
            const likeCount = (post.likes || []).length;
            const liked = (post.likes || []).includes(deviceId);
            const countEls = [
                document.getElementById(`likeCnt_${post.id}`),
                document.querySelector(`[data-detail-likecount="${post.id}"]`)
            ].filter(Boolean);
            countEls.forEach(el => el.textContent = likeCount || '赞');
            const heartEls = [
                document.getElementById(`heart_${post.id}`),
                document.querySelector(`[data-detail-heart="${post.id}"]`)
            ].filter(Boolean);
            heartEls.forEach(svg => {
                if (liked) {
                    svg.setAttribute('fill', 'currentColor');
                    svg.removeAttribute('stroke');
                    svg.classList.add('text-pink-500');
                    if (svg.parentElement) {
                        svg.parentElement.classList.add('text-pink-500');
                        svg.parentElement.style.color = '';

            const buttons = document.querySelectorAll(`button[onclick="likeComment('${postId}','${commentId}')"]`);
            buttons.forEach(btn => {
                btn.classList.toggle('text-pink-500', liked);

        function syncCommentArea(postId) {

            if (!post) return;
            const inlineHtml = renderCommentsHtml(postId, post.comments || [], 'inline');
            const detailHtml = renderCommentsHtml(postId, post.comments || [], 'detail');

            if (listBox) {

        function buildDisplayPosts() {
            let displayPosts = posts.filter(p => {
                p = p || {};
                if (showOnlyMine && p.deviceId !== deviceId) return false;
                if (localStorage.getItem(LS_FILTER_KEY) === '1' && !isFavoritePost(p.id)) return false;
                if (showOnlyLiked && !(Array.isArray(p.likes) && p.likes.includes(deviceId))) return false;
                if (showOnlyUnread && isViewedPost(p.id)) return false;
                if (showOnlyPinned && !p.pinned) return false;
                if (showOnlyAnon && !p.isAnon) return false;
                if (showOnlyPublic && p.isAnon) return false;
                if (filterKeyword) {
                    const kw = filterKeyword.toLowerCase();
                    const commentHit = Array.isArray(p.comments) && p.comments.some(c => {
                        const hay = `${c?.content || ''} ${c?.replyName || ''}`.toLowerCase();
                        return hay.includes(kw);
                    });
                    return (p.to || '').toLowerCase().includes(kw) || (p.content || '').toLowerCase().includes(kw) || (p.from || '').toLowerCase().includes(kw) || commentHit;
                }
                return true;
            });

            displayPosts.sort((a, b) => {
                if (!!a.pinned && !b.pinned) return -1;
                if (!a.pinned && !!b.pinned) return 1;
                const hotA = ((a.likes?.length || 0) * 2) + ((a.comments?.length || 0) * 3);
                const hotB = ((b.likes?.length || 0) * 2) + ((b.comments?.length || 0) * 3);
                const activeA = latestActivityTs(a);
                const activeB = latestActivityTs(b);
                if (currentSort === 'active') return activeB - activeA || (b.time || 0) - (a.time || 0);
                if (currentSort === 'hot') return hotB - hotA || (b.time || 0) - (a.time || 0);
                if (currentSort === 'likes') return (b.likes?.length || 0) - (a.likes?.length || 0) || (b.time || 0) - (a.time || 0);
                if (currentSort === 'comments') return (b.comments?.length || 0) - (a.comments?.length || 0) || (b.time || 0) - (a.time || 0);
                if (currentSort === 'old') return (a.time || 0) - (b.time || 0);
                return (b.time || 0) - (a.time || 0);
            });

            return displayPosts;
        }

        function focusPostById(postId) {


            if (!postId) return false;
            const displayPosts = buildDisplayPosts();
            const idx = displayPosts.findIndex(p => p && p.id === postId);
            if (idx < 0) return false;

            currentPage = Math.floor(idx / pageSize) + 1;
            pendingDeepLinkPostId = '';

            setTimeout(() => {
                const el = document.getElementById(`post_${postId}`);

                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    el.classList.add('ring-2', 'ring-accent/40', 'ring-offset-2', 'ring-offset-transparent');

                    renderAnnouncementBar();

                    }

                        loadAdminUsers();

                    renderPosts();
                    renderAnnouncementBar();

                renderPosts();

                    info.textContent = '加载失败';

        function formatTime(ts) {
            const diff = Math.floor(Date.now() / 1000) - ts;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff/60) + '分钟前';
            if (diff < 86400) return Math.floor(diff/3600) + '小时前';
            if (diff < 86400 * 30) return Math.floor(diff/86400) + '天前';
            const d = new Date(ts * 1000); return `${d.getMonth()+1}-${d.getDate()}`;
        }

        function latestActivityTs(post) {
            const base = Number(post && post.time ? post.time : 0) || 0;
            const comments = Array.isArray(post && post.comments) ? post.comments : [];
            const latestComment = comments.reduce((maxTs, c) => {
                const ts = Number(c && c.time ? c.time : 0) || 0;
                return ts > maxTs ? ts : maxTs;
            }, 0);
            return Math.max(base, latestComment);
        }

        function escapeHtml(str) {
            return (str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;").replace(/\n/g, "<br>");
        }

        function trimName(v) {
            return (v || '').trim().slice(0, nameMaxLen);
        }

        function maskDeviceId(id) {
            if (!id) return '未知设备';
            if (id.length <= 10) return id;
            return id.slice(0, 6) + '…' + id.slice(-4);
        }

        function clampPage(totalPages) {
            currentPage = Math.max(1, Math.min(currentPage, totalPages || 1));

function renderPagination(totalPages, totalCount) {
            const box = document.getElementById('pagination');
            if (!box) return;

            if (totalCount <= pageSize || totalPages <= 1) {
                box.innerHTML = '';
                return;
            }

            const prevDisabled = currentPage <= 1;
            const nextDisabled = currentPage >= totalPages;
            const start = Math.max(1, currentPage - 2);
            const end = Math.min(totalPages, currentPage + 2);

            let pageBtns = '';
            if (start > 1) {
                pageBtns += `<button type="button" onclick="goPage(1)" class="min-w-10 h-10 px-3 rounded-full text-sm font-black tap-effect transition-all bg-black/5 dark:bg-white/5" style="color: var(--text-main)">1</button>`;
                if (start > 2) pageBtns += `<span class="px-1 opacity-40">…</span>`;
            }

            for (let i = start; i <= end; i++) {
                const active = i === currentPage;
                pageBtns += `<button type="button" onclick="goPage(${i})" class="min-w-10 h-10 px-3 rounded-full text-sm font-black tap-effect transition-all ${active ? 'bg-accent text-white shadow-md' : 'bg-black/5 dark:bg-white/5'}" style="color: ${active ? '#fff' : 'var(--text-main)'}">${i}</button>`;
            }

        async function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            post.likes = Array.isArray(post.likes) ? post.likes : [];
            const idx = post.likes.indexOf(deviceId);

            const heart = document.getElementById(`heart_${postId}`);
            if (heart) {
                heart.classList.remove('anim-spring');
                void heart.offsetWidth;
            }

            if (idx > -1) {
                post.likes.splice(idx, 1);
                if (heart) {
                    heart.setAttribute('fill', 'none');
                    heart.setAttribute('stroke', 'currentColor');
                }
            } else {
                post.likes.push(deviceId);
                if (heart) {
                    heart.classList.add('anim-spring');
                    heart.setAttribute('fill', 'currentColor');
                    heart.removeAttribute('stroke');
                }
            }
            syncPostLikeUI(post);

            const res = await apiCall('like_post', { postId });
            if (!res.success) loadPosts(); // 回滚
            else syncPostLikeUI(post);
        }

        function toggleCommentBox(postId) {
            const box = document.getElementById(`comments_${postId}`);
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) document.getElementById(`ipt_${postId}`).focus();
        }

        async function sendComment(postId) {
            const ipt = document.getElementById(`ipt_${postId}`);
            const content = ipt.value.trim().slice(0, commentMaxLen);
            ipt.value = content;
            if (!content) return;
            ipt.disabled = true;
            const res = await apiCall('add_comment', { postId, content });
            if (res.success) {
                ipt.value = '';
                await loadPosts();
                if(!document.getElementById(`comments_${postId}`).classList.contains('hidden')) toggleCommentBox(postId);
                renderDetailIfOpen();
                showToast('评论发布成功');
            }
            ipt.disabled = false;
        }

        async function likeComment(postId, commentId) {
            const res = await apiCall('like_comment', { postId, commentId });
            if (res.success) {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const comment = (post.comments || []).find(c => c.id === commentId);
                if (!comment) return;
                comment.likes = Array.isArray(comment.likes) ? comment.likes : [];
                if (res.status === 'liked') {
                    comment.likes.push(deviceId);
                } else {
                    comment.likes = comment.likes.filter(id => id !== deviceId);
                }
                const likes = comment.likes.length;
                const liked = comment.likes.includes(deviceId);
                updateCommentLikeUI(postId, commentId, likes, liked);
                syncCommentArea(postId);
                renderDetailIfOpen();
            }
        }

        function copyText(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return showToast('帖子不存在');
            const decode = (value) => {
                const ta = document.createElement('textarea');
                ta.innerHTML = String(value ?? '');
                return ta.value;
            };
            const author = decode(post.isAnon ? '匿名' : (post.from || '匿名'));
            const to = decode(post.to || 'Ta');
            const text = `致 ${to}：\n${decode(post.content || '')}\n\nFrom ${author}\n-- 萧县中学表白墙`;
            copyToClipboard(text, '文本已复制到剪贴板');
        }

        async function loadAdminUsers() {
            if (!adminToken) return;
            const res = await apiCall('admin_action', { subAction: 'users', adminPwd: adminToken });
            if (!res.success) return;
            const wrap = document.getElementById('userList');
            if (!wrap) return;
            const users = Array.isArray(res.users) ? res.users : [];
            const keyword = ((document.getElementById('adminUserSearch') || {}).value || '').trim().toLowerCase();
            const filtered = keyword ? users.filter(u => {
                const hay = `${u.deviceId || ''} ${u.latestName || ''} ${u.banReason || ''}`.toLowerCase();

                    : `<span class="text-[10px] font-black px-2 py-1 rounded-full bg-emerald-500/15 text-emerald-600">活跃</span>`;
                const banText = getBanText(u);

        async function toggleBan(targetDeviceId, isBannedNow = false) {
            if (!adminToken) return;
            if (!targetDeviceId) {
                showToast('缺少目标设备');
                return;
            }
            if (isBannedNow) {
                const res = await apiCall('admin_action', { subAction: 'unban_user', targetDeviceId, adminPwd: adminToken });
                if (res.success) {
                    showToast('已解除封禁');
                    loadAdminStats();
                    loadAdminUsers();
                    loadPosts();
                }
                return;
            }
            const hoursText = prompt('请输入封禁时长（小时，留空或 0 为永久封禁）', '0');
            if (hoursText === null) return;
            const reason = prompt('请输入封禁原因（可留空）', '') ?? '';
            const hours = Math.max(0, parseInt(hoursText, 10) || 0);
            const res = await apiCall('admin_action', {
                subAction: 'ban_user',
                targetDeviceId,
                hours,
                reason,
                adminPwd: adminToken
            });
            if (res.success) {
                showToast(hours > 0 ? `已封禁 ${hours} 小时` : '已永久封禁');
                loadAdminStats();
                loadAdminUsers();
                loadPosts();
            }
        }

            const a = document.createElement('a');
            a.href = url;
            a.download = `xxzx_wall_backup_v1.5.5_${Date.now()}.json`;

            setTimeout(() => URL.revokeObjectURL(url), 1000);

            const overlay = document.getElementById('drawerOverlay');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.classList.remove('opacity-0'); drawer.classList.remove('-translate-x-full'); }, 10);

        function openPostModal() {
            const modal = document.getElementById('postModal');
            const box = modal.querySelector('.glass-card');
            modal.classList.remove('hidden');

            const todayStart = new Date(); todayStart.setHours(0,0,0,0);
            const ts = Math.floor(todayStart.getTime() / 1000);
            const myCount = posts.filter(p => p.deviceId === deviceId && p.time >= ts).length;
            document.getElementById('postQuota').textContent = Math.max(0, 3 - myCount);

            document.getElementById('postTo').value = '';
            document.getElementById('postFrom').value = '';
            document.getElementById('postContent').value = '';
