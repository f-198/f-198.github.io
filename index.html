<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Archive | 个人网页时光机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        premium: {
                            bg: '#09090b',       /* 极深灰/接近纯黑 */
                            card: '#18181b',     /* 卡片底色 */
                            border: 'rgba(255,255,255,0.08)', /* 极细微的白边 */
                            text: '#fafafa',     /* 主文本 */
                            sub: '#a1a1aa'       /* 副文本 */
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        *:focus { outline: none !important; }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 动态背景 - 亮色模式 */
        .bg-light { background: #f8fafc; }
        
        /* 动态背景 - 极客黑模式 */
        .bg-dark { background: #09090b; }

        /* 动态装饰圆 - 亮色保持活泼，暗色改为极度克制的极光微晕 */
        .bg-shape { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; transition: opacity 0.5s ease; }
        .light .shape-1 { width: 500px; height: 500px; background: rgba(224, 195, 252, 0.5); top: -100px; left: -100px; }
        .light .shape-2 { width: 400px; height: 400px; background: rgba(142, 197, 252, 0.5); bottom: -50px; right: -50px; }
        .dark .shape-1 { width: 600px; height: 600px; background: rgba(255, 255, 255, 0.02); top: -150px; left: -150px; }
        .dark .shape-2 { width: 500px; height: 500px; background: rgba(255, 255, 255, 0.015); bottom: -100px; right: -100px; }

        /* 玻璃拟态卡片 */
        .glass-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 亮色卡片 */
        .light .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
        }
        .light .glass-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
            background: #ffffff; 
        }

        /* 暗色卡片 - Vercel 质感 */
        .dark .glass-card { 
            background: #18181b; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); 
        }
        .dark .glass-card:hover { 
            transform: translateY(-4px); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4); 
            background: #1f1f22; 
        }

        .font-heavy { font-weight: 800; letter-spacing: -0.02em; }

        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .light .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .light .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* 卡片入场动画 */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

        /* ==================================================
           View Transitions API - 核心性能优化
           ================================================== */
        ::view-transition-old(root),
        ::view-transition-new(root) {
            /* 去除 mix-blend-mode 提升渲染性能，防止掉帧 */
            animation: none;
        }
        ::view-transition-old(root) {
            z-index: 1; /* 旧视图在底层 */
        }
        ::view-transition-new(root) {
            z-index: 9999; /* 新视图永远在最顶层裁剪扩散 */
        }
    </style>
</head>
<body class="min-h-screen antialiased relative bg-light dark:bg-premium-bg text-gray-900 dark:text-premium-text transition-none">

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <nav class="sticky top-0 z-50 px-6 py-4 mb-8 bg-white/60 dark:bg-premium-bg/70 backdrop-blur-xl border-b border-gray-200/50 dark:border-premium-border shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-4">
            
            <div class="flex items-center space-x-3 cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.reload()">
                <div class="w-10 h-10 rounded-xl bg-gray-900 dark:bg-white flex items-center justify-center shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white dark:text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-heavy bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400">
                        Archive.
                    </h1>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <select id="sortSelect" class="hidden md:block py-2.5 pl-3 pr-8 rounded-xl border border-gray-200 dark:border-premium-border bg-white/50 dark:bg-premium-card text-sm font-medium focus:border-gray-400 dark:focus:border-gray-500 cursor-pointer text-gray-700 dark:text-premium-text transition-colors">
                    <option value="nameAsc">域名 A-Z</option>
                    <option value="nameDesc">域名 Z-A</option>
                    <option value="countDesc">快照最多</option>
                </select>

                <div class="relative w-full md:w-72 hidden md:block">
                    <input type="text" id="searchInput" placeholder="搜索域名..." class="w-full pl-4 pr-12 py-2.5 rounded-xl border border-gray-200 dark:border-premium-border bg-white/50 dark:bg-premium-card font-medium focus:bg-white dark:focus:bg-[#27272a] focus:border-gray-400 dark:focus:border-[#52525b] transition-all placeholder-gray-400 dark:placeholder-premium-sub shadow-sm text-gray-700 dark:text-white">
                    <button onclick="executeSearch('searchInput')" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-gray-400 hover:text-gray-800 hover:bg-gray-100 dark:text-premium-sub dark:hover:bg-[#27272a] dark:hover:text-white transition-colors">
                        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>

                <button id="themeToggle" class="relative p-2.5 rounded-xl border border-gray-200 dark:border-premium-border bg-white/50 dark:bg-premium-card text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-[#27272a] transition-colors shadow-sm w-10 h-10 flex items-center justify-center">
                    <svg id="sunIcon" class="absolute w-5 h-5 hidden dark:block transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="moonIcon" class="absolute w-5 h-5 block dark:hidden transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mb-6 md:hidden space-y-3">
        <div class="relative w-full">
            <input type="text" id="searchInputMobile" placeholder="搜索域名..." class="w-full pl-4 pr-12 py-3.5 rounded-2xl border border-gray-200 dark:border-premium-border bg-white/60 dark:bg-premium-card font-medium focus:bg-white dark:focus:bg-[#27272a] focus:border-gray-400 dark:focus:border-[#52525b] transition-all shadow-sm text-gray-700 dark:text-white">
            <button onclick="executeSearch('searchInputMobile')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-xl text-gray-400 hover:text-gray-800 hover:bg-gray-100 dark:text-premium-sub dark:hover:bg-[#27272a] dark:hover:text-white transition-colors">
                <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
        <select id="sortSelectMobile" class="w-full py-3 px-4 rounded-xl border border-gray-200 dark:border-premium-border bg-white/50 dark:bg-premium-card text-sm font-medium focus:border-gray-400 dark:focus:border-[#52525b] text-gray-700 dark:text-premium-text">
            <option value="nameAsc">按域名 A-Z 排序</option>
            <option value="nameDesc">按域名 Z-A 排序</option>
            <option value="countDesc">按快照数量最多排序</option>
        </select>
    </div>

    <div class="max-w-6xl mx-auto px-4 mb-6">
        <div class="flex items-center space-x-4 text-sm font-medium text-gray-500 dark:text-premium-sub">
            <span id="totalDomains">加载中...</span>
            <span class="w-1 h-1 rounded-full bg-gray-300 dark:bg-gray-700"></span>
            <span id="totalSnapshots">加载中...</span>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 pb-16">

        <div id="loading" class="text-center py-32">
            <div class="inline-block w-10 h-10 border-3 border-gray-200 dark:border-[#27272a] border-t-gray-800 dark:border-t-white rounded-full animate-spin mb-4"></div>
            <p class="text-gray-500 dark:text-premium-sub font-medium tracking-wide text-sm">Syncing timeline...</p>
        </div>

        <div id="errorBox" class="hidden text-center py-32">
            <div class="w-16 h-16 bg-red-100 dark:bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="h-8 w-8 text-red-500 dark:text-red-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <h2 class="text-xl font-heavy text-gray-800 dark:text-white mb-2">暂无存档数据</h2>
            <p class="text-sm text-gray-500 dark:text-premium-sub">请先运行 Python 脚本抓取网页数据。</p>
        </div>

        <div id="archiveGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>

        <div id="pagination" class="hidden mt-12"></div>
    </main>

    <script>
        const State = { data: [], filteredData: [], sortBy: 'nameAsc', currentPage: 1, itemsPerPage: 9 };

        // 初始化主题
        function initTheme() {
            const htmlClass = document.documentElement.classList;
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlClass.add('dark'); htmlClass.remove('light');
            } else {
                htmlClass.add('light'); htmlClass.remove('dark');
            }
        }

        // 核心优化：极致顺滑的切换动画
        document.getElementById('themeToggle').addEventListener('click', (e) => {
            const htmlClass = document.documentElement.classList;
            const isDark = htmlClass.contains('dark');
            const nextTheme = isDark ? 'light' : 'dark';

            // 图标微动效
            const activeIcon = isDark ? document.getElementById('sunIcon') : document.getElementById('moonIcon');
            activeIcon.style.transform = 'scale(0.8) rotate(-45deg)';
            setTimeout(() => { activeIcon.style.transform = 'scale(1) rotate(0)'; }, 150);

            // 兼容性回退
            if (!document.startViewTransition) {
                htmlClass.toggle('dark');
                htmlClass.toggle('light');
                localStorage.theme = nextTheme;
                return;
            }

            // 获取点击坐标
            const x = e.clientX;
            const y = e.clientY;
            // 计算最大扩散半径
            const endRadius = Math.hypot(
                Math.max(x, window.innerWidth - x),
                Math.max(y, window.innerHeight - y)
            );

            const transition = document.startViewTransition(() => {
                htmlClass.toggle('dark');
                htmlClass.toggle('light');
                localStorage.theme = nextTheme;
            });

            // 性能优化：使用更平滑的 ease-out，时间缩短至 400ms，消除拖沓感
            transition.ready.then(() => {
                document.documentElement.animate(
                    {
                        clipPath: [
                            `circle(0px at ${x}px ${y}px)`,
                            `circle(${endRadius}px at ${x}px ${y}px)`
                        ]
                    },
                    {
                        duration: 400,
                        easing: 'cubic-bezier(0.25, 1, 0.5, 1)', 
                        pseudoElement: '::view-transition-new(root)'
                    }
                );
            });
        });

        function formatTime(ts) {
            if(!ts || ts.length !== 15) return ts;
            return `${ts.substring(0,4)}-${ts.substring(4,6)}-${ts.substring(6,8)} ${ts.substring(9,11)}:${ts.substring(11,13)}`;
        }

        function updateStats(data) {
            const domainCount = data.length;
            const snapCount = data.reduce((sum, site) => sum + (site.snapshots ? site.snapshots.length : 0), 0);
            document.getElementById('totalDomains').textContent = `共 ${domainCount} 个域名`;
            document.getElementById('totalSnapshots').textContent = `计 ${snapCount} 个快照`;
        }

        function applyProcess() {
            State.filteredData.sort((a, b) => {
                if (State.sortBy === 'nameAsc') return a.domain.localeCompare(b.domain);
                if (State.sortBy === 'nameDesc') return b.domain.localeCompare(a.domain);
                if (State.sortBy === 'countDesc') return b.snapshots.length - a.snapshots.length;
                return 0;
            });
            
            const startIdx = (State.currentPage - 1) * State.itemsPerPage;
            const paginatedData = State.filteredData.slice(startIdx, startIdx + State.itemsPerPage);
            
            renderCards(paginatedData);
            renderPagination(State.filteredData.length);
        }

        function renderCards(data) {
            const grid = document.getElementById('archiveGrid');
            grid.innerHTML = '';

            if (State.filteredData.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 opacity-70">
                        <svg class="w-16 h-16 text-gray-400 dark:text-[#52525b] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <span class="text-gray-500 dark:text-premium-sub font-medium text-sm">没有找到匹配的域名</span>
                    </div>`;
                document.getElementById('pagination').classList.add('hidden');
                return;
            }

            data.forEach((site, index) => {
                const latestSnapshot = site.snapshots[0];
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl p-6 flex flex-col h-full animate-card';
                card.style.animationDelay = `${index * 0.04}s`;

                let historyHtml = site.snapshots.map((snap, i) => `
                    <a href="${snap.path}" target="_blank" class="group flex items-center justify-between p-3 rounded-xl hover:bg-gray-50 dark:hover:bg-[#27272a] transition-all ${i === 0 ? 'bg-gray-50/80 dark:bg-[#27272a]/50 border border-gray-200/60 dark:border-[#3f3f46]/50' : 'border border-transparent'}">
                        <span class="flex items-center text-sm font-medium ${i === 0 ? 'text-gray-900 dark:text-white' : 'text-gray-500 dark:text-premium-sub group-hover:text-gray-900 dark:group-hover:text-white'}">
                            <svg class="w-4 h-4 mr-2 ${i === 0 ? 'text-gray-700 dark:text-gray-400' : 'text-gray-400 dark:text-premium-sub'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            ${formatTime(snap.timestamp)}
                        </span>
                        <span class="text-[11px] font-bold bg-white dark:bg-[#18181b] px-2 py-1 rounded border border-gray-200 dark:border-[#3f3f46] shadow-sm text-gray-500 dark:text-premium-sub group-hover:text-gray-800 dark:group-hover:text-white transition-colors">${snap.pages || 1} P</span>
                    </a>
                `).join('');

                card.innerHTML = `
                    <div class="flex items-start justify-between mb-5">
                        <div class="flex-1 overflow-hidden pr-4">
                            <h3 class="text-lg font-heavy text-gray-900 dark:text-white truncate tracking-tight" title="${site.domain}">${site.domain}</h3>
                            <div class="flex items-center mt-1.5 space-x-2">
                                <span class="px-2 py-0.5 rounded bg-gray-100 dark:bg-[#27272a] text-gray-600 dark:text-[#a1a1aa] text-[11px] font-bold border border-gray-200/50 dark:border-[#3f3f46]">${site.snapshots.length} Snapshots</span>
                            </div>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-[#27272a] flex items-center justify-center flex-shrink-0">
                            <span class="text-lg font-bold text-gray-600 dark:text-white">${site.domain.charAt(0).toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="flex-1">
                        <div class="text-[11px] font-bold text-gray-400 dark:text-[#52525b] uppercase tracking-wider mb-2 px-1">Timeline</div>
                        <div class="space-y-1.5 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                            ${historyHtml}
                        </div>
                    </div>
                    
                    <div class="mt-5 pt-4 border-t border-gray-100 dark:border-premium-border">
                        <a href="${latestSnapshot.path}" target="_blank" class="flex items-center justify-center w-full bg-gray-900 dark:bg-white hover:bg-gray-800 dark:hover:bg-gray-200 text-white dark:text-black text-sm font-semibold py-3 rounded-xl transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5">
                            <span>查看最新快照</span>
                            <svg class="w-4 h-4 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / State.itemsPerPage);
            const container = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                container.innerHTML = ''; container.classList.add('hidden'); return;
            }
            
            container.classList.remove('hidden');
            let html = `<div class="flex justify-center items-center space-x-1.5">`;
            
            const prevDisabled = State.currentPage === 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100 dark:hover:bg-[#27272a] cursor-pointer';
            html += `<button onclick="changePage(${State.currentPage - 1})" class="px-3.5 py-2 rounded-xl bg-white dark:bg-premium-card border border-gray-200 dark:border-premium-border text-sm font-medium text-gray-600 dark:text-premium-sub transition-colors ${prevDisabled}" ${State.currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            let startPage = Math.max(1, State.currentPage - 2);
            let endPage = Math.min(totalPages, State.currentPage + 2);
            
            if (startPage > 1) {
                html += `<button onclick="changePage(1)" class="w-9 h-9 rounded-xl border border-gray-200 dark:border-premium-border bg-white dark:bg-premium-card flex items-center justify-center text-sm font-medium transition-colors hover:bg-gray-50 dark:hover:bg-[#27272a] text-gray-600 dark:text-premium-text">1</button>`;
                if (startPage > 2) html += `<span class="px-1 text-gray-400 dark:text-[#52525b]">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const activeClass = i === State.currentPage 
                    ? 'bg-gray-900 text-white dark:bg-white dark:text-black border-transparent shadow-md' 
                    : 'bg-white dark:bg-premium-card border-gray-200 dark:border-premium-border text-gray-600 dark:text-premium-text hover:bg-gray-50 dark:hover:bg-[#27272a] cursor-pointer';
                html += `<button onclick="changePage(${i})" class="w-9 h-9 rounded-xl border flex items-center justify-center text-sm font-medium transition-colors ${activeClass}">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="px-1 text-gray-400 dark:text-[#52525b]">...</span>`;
                html += `<button onclick="changePage(${totalPages})" class="w-9 h-9 rounded-xl border border-gray-200 dark:border-premium-border bg-white dark:bg-premium-card flex items-center justify-center text-sm font-medium transition-colors hover:bg-gray-50 dark:hover:bg-[#27272a] text-gray-600 dark:text-premium-text">${totalPages}</button>`;
            }
            
            const nextDisabled = State.currentPage === totalPages ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100 dark:hover:bg-[#27272a] cursor-pointer';
            html += `<button onclick="changePage(${State.currentPage + 1})" class="px-3.5 py-2 rounded-xl bg-white dark:bg-premium-card border border-gray-200 dark:border-premium-border text-sm font-medium text-gray-600 dark:text-premium-sub transition-colors ${nextDisabled}" ${State.currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            
            html += `</div>`;
            container.innerHTML = html;
        }

        window.changePage = function(page) {
            const totalPages = Math.ceil(State.filteredData.length / State.itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                State.currentPage = page;
                applyProcess();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.executeSearch = function(inputId) {
            const inputEl = document.getElementById(inputId);
            const keyword = inputEl.value.toLowerCase();
            State.filteredData = State.data.filter(site => site.domain.toLowerCase().includes(keyword));
            State.currentPage = 1;
            applyProcess();
        };

        async function init() {
            initTheme();
            try {
                const response = await fetch('archive_index.json?_t=' + new Date().getTime());
                if (!response.ok) throw new Error('Network response was not ok');
                const result = await response.json();
                
                State.data = result.archives || [];
                State.filteredData = [...State.data];
                
                updateStats(State.data);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('archiveGrid').classList.remove('hidden');
                
                applyProcess();

            } catch (error) {
                console.error('Failed to load archive index:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorBox').classList.remove('hidden');
            }
        }

        const handleSearchInput = (e) => {
            const keyword = e.target.value.toLowerCase();
            State.filteredData = State.data.filter(site => site.domain.toLowerCase().includes(keyword));
            State.currentPage = 1; 
            applyProcess();
        };

        const handleSortChange = (e) => {
            State.sortBy = e.target.value;
            State.currentPage = 1; 
            document.getElementById('sortSelect').value = State.sortBy;
            document.getElementById('sortSelectMobile').value = State.sortBy;
            applyProcess();
        };

        document.getElementById('searchInput').addEventListener('input', handleSearchInput);
        document.getElementById('searchInputMobile').addEventListener('input', handleSearchInput);
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') executeSearch('searchInput'); });
        document.getElementById('searchInputMobile').addEventListener('keypress', (e) => { if(e.key === 'Enter') executeSearch('searchInputMobile'); });
        document.getElementById('sortSelect').addEventListener('change', handleSortChange);
        document.getElementById('sortSelectMobile').addEventListener('change', handleSortChange);

        init();
    </script>
</body>
</html>
